name: Update Liberating River Catalog

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      TRL_CHANNEL_VIDEOS_URL: ${{ secrets.TRL_CHANNEL_VIDEOS_URL }}
      TRL_CHANNEL_SHORTS_URL: ${{ secrets.TRL_CHANNEL_SHORTS_URL }}
      TRL_PODBEAN_FEED_URL: ${{ secrets.TRL_PODBEAN_FEED_URL }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run updater
        run: |
          python scripts/update_catalog.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add TLR_Catalog.csv

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update catalog"
            git push
          fi
